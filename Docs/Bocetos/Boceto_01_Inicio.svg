<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <rect width="1200" height="320" fill="#f8fafc"/>
  <text x="24" y="34" font-family="Arial, sans-serif" font-size="22" fill="#0f172a">Boceto 1 - Inicio</text>

  <!-- Ground -->
  <line x1="40" y1="210" x2="520" y2="210" stroke="#0f172a" stroke-width="4"/>
  <line x1="600" y1="210" x2="1080" y2="210" stroke="#0f172a" stroke-width="4"/>

  <!-- Gap -->
  <line x1="520" y1="210" x2="600" y2="210" stroke="#ef4444" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="535" y="235" font-family="Arial, sans-serif" font-size="14" fill="#b91c1c">foso</text>

  <!-- Hazards -->
  <rect x="300" y="203" width="50" height="7" fill="#dc2626"/>
  <rect x="760" y="203" width="50" height="7" fill="#dc2626"/>

  <!-- Chests / pickups -->
  <rect x="110" y="193" width="18" height="14" fill="#a16207"/>
  <rect x="705" y="193" width="18" height="14" fill="#a16207"/>
  <circle cx="900" cy="188" r="8" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="914" y="192" font-family="Arial, sans-serif" font-size="13" fill="#1e40af">llave</text>

  <!-- Start -->
  <circle cx="75" cy="190" r="8" fill="#16a34a"/>
  <text x="45" y="175" font-family="Arial, sans-serif" font-size="13" fill="#166534">spawn</text>

  <!-- Arrows -->
  <line x1="160" y1="170" x2="470" y2="170" stroke="#334155" stroke-width="3"/>
  <polygon points="470,170 458,164 458,176" fill="#334155"/>
  <line x1="650" y1="170" x2="1020" y2="170" stroke="#334155" stroke-width="3"/>
  <polygon points="1020,170 1008,164 1008,176" fill="#334155"/>
</svg>
