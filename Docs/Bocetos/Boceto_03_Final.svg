<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <rect width="1200" height="320" fill="#f8fafc"/>
  <text x="24" y="34" font-family="Arial, sans-serif" font-size="22" fill="#0f172a">Boceto 3 - Tramo final</text>

  <!-- Left elevated platform -->
  <rect x="60" y="120" width="130" height="150" fill="#cbd5e1"/>
  <line x1="60" y1="120" x2="190" y2="120" stroke="#0f172a" stroke-width="4"/>

  <!-- Floating mini platforms -->
  <line x1="250" y1="170" x2="310" y2="170" stroke="#0f172a" stroke-width="4"/>
  <line x1="355" y1="145" x2="415" y2="145" stroke="#0f172a" stroke-width="4"/>
  <line x1="460" y1="175" x2="520" y2="175" stroke="#0f172a" stroke-width="4"/>

  <!-- Hazard floor -->
  <rect x="610" y="210" width="430" height="8" fill="#dc2626"/>
  <text x="790" y="236" font-family="Arial, sans-serif" font-size="13" fill="#b91c1c">zona de pinchos</text>

  <!-- End platform -->
  <rect x="1060" y="120" width="110" height="150" fill="#cbd5e1"/>
  <line x1="1060" y1="120" x2="1170" y2="120" stroke="#0f172a" stroke-width="4"/>

  <!-- Goal and key -->
  <rect x="1090" y="105" width="16" height="12" fill="#a16207"/>
  <circle cx="1138" cy="102" r="8" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="1080" y="90" font-family="Arial, sans-serif" font-size="13" fill="#1e40af">ultimo objetivo</text>

  <!-- Route arrows -->
  <path d="M120 105 Q220 70 280 160" fill="none" stroke="#334155" stroke-width="3"/>
  <path d="M280 160 Q350 110 390 138" fill="none" stroke="#334155" stroke-width="3"/>
  <path d="M390 138 Q500 80 640 198" fill="none" stroke="#334155" stroke-width="3"/>
  <path d="M640 198 Q840 130 1110 110" fill="none" stroke="#334155" stroke-width="3"/>
  <polygon points="1110,110 1098,104 1098,116" fill="#334155"/>
</svg>
